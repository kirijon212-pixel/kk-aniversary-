```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ff4e50, #fc913a);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* BIG TITLE */
h1 {
    font-size: 70px;
    text-shadow: 0 0 20px #fff, 0 0 40px #ff0080;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 10px #fff;}
    to {text-shadow: 0 0 30px #ff00cc;}
}

h2 {
    font-size: 30px;
}

/* HEART BEAT */
.heart {
    font-size: 60px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0%,100% {transform: scale(1);}
    50% {transform: scale(1.3);}
}

/* SLIDESHOW CENTER */
.slideshow {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 450px;
}

/* SLIDES */
.slideshow img {
    width: 90%;
    max-width: 400px;
    border-radius: 20px;
    display: none;
    box-shadow: 0 0 20px black;
    margin: auto;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

/* SHOW ACTIVE IMAGE */
.slideshow img.active {
    display: block;
    opacity: 1;
}

/* FLOATING HEARTS */
.heart-float {
    position: fixed;
    bottom: -10px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(0); opacity:1;}
    100% {transform: translateY(-100vh); opacity:0;}
}

/* BALLOONS */
.balloon {
    position: fixed;
    bottom: -100px;
    width: 40px;
    height: 60px;
    border-radius: 50%;
    animation: rise 8s linear infinite;
}

@keyframes rise {
    0% {transform: translateY(0);}
    100% {transform: translateY(-120vh);}
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}

footer {
    margin-top: 30px;
    font-size: 30px;
}
</style>
</head>

<body>

<h1>🎉 HAPPY ANNIVERSARY 🎉</h1>
<h2>💖 Keethu & Kiri 💖</h2>
<h2>📅 2026.05.09</h2>

<h1>My Chellakuddy 💕</h1>
<div class="heart">❤️</div>

<!-- Slideshow -->
<div class="slideshow">
    <img src="DSC_0025 copy.jpg" class="slide active">
    <img src="DSC_0026 copy.jpg" class="slide">
    <img src="DSC_0077 copy.jpg" class="slide">
    <img src="DSC_0038 copy.jpg" class="slide">
    <img src="DSC_0039 copy.jpg" class="slide">
    <img src="DSC_0092 copy.jpg" class="slide">
    <img src="DSC_0094 copy.jpg" class="slide">
</div>

<footer>
    💞 Forever Together 💞
</footer>

<audio autoplay loop>
    <source src="Bigil - Unakaga Bgm.mp3" type="audio/mpeg">
</audio>

<script>
// SLIDESHOW WITH FADE
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlides() {
    slides.forEach(s => s.classList.remove("active"));
    index++;
    if (index > slides.length) index = 1;
    slides[index-1].classList.add("active");
    setTimeout(showSlides, 3000);
}
showSlides();

// FLOATING HEARTS
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.className = "heart-float";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}, 300);

// BALLOONS
setInterval(() => {
    let balloon = document.createElement("div");
    balloon.className = "balloon";
    balloon.style.left = Math.random() * 100 + "vw";
    balloon.style.background = `hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(balloon);
    setTimeout(() => balloon.remove(), 8000);
}, 500);

// CONFETTI
setInterval(() => {
    let confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.background = `hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 5000);
}, 100);
</script>

</body>
</html>
